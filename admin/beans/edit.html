<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>원두 수정 - 해피해피 용's 카페 Admin</title>
<link rel="stylesheet" href="../../css/variables.css" />
<link rel="stylesheet" href="edit.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__title">해피해피 용's 카페 Admin</div>
    <nav>
      <a href="../" data-icon="dashboard">대시보드</a>
      <a href="../menus/list.html" data-icon="menu">메뉴 관리</a>
      <a href="list.html" class="is-active" data-icon="bean">원두 관리</a>
      <a href="../hero/list.html" data-icon="dashboard">히어로 배너</a>
      <a href="../inquiries/list.html" data-icon="receipt">문의 관리</a>
      <a href="../orders/list.html" data-icon="receipt">주문 관리</a>
      <a href="../members/list.html" data-icon="users">회원 관리</a>
      <a href="../../index.html" data-icon="home">고객 화면</a>
    </nav>
  </aside>
  <main class="admin-main">
    <a href="list.html" class="back-link">← 원두 목록</a>
    <h1>원두 수정</h1>
    <form id="beanForm" class="card form-card">
      <div class="field">
        <label for="name">원두명</label>
        <input id="name" name="name" type="text" required />
      </div>
      <div class="field">
        <label for="origin">원산지</label>
        <input id="origin" name="origin" type="text" required />
      </div>
      <div class="field">
        <label for="imageFile">원두 사진</label>
        <input id="imageFile" type="file" accept="image/*" />
        <img id="imagePreview" class="image-preview" hidden />
        <input id="image" name="image" type="text" required />
      </div>
      <div class="field">
        <label for="note">시음 노트</label>
        <textarea id="note" name="note" required></textarea>
      </div>
      <div class="field">
        <label for="menuId">연결할 메뉴 (선택)</label>
        <select id="menuId" name="menuId"></select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">저장하기</button>
    </form>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../js/supabase-client.js"></script>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="edit.js"></script>
</body>
</html>
