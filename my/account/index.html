<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 계정 정보 - 해피해피 용's 카페</title>
<link rel="stylesheet" href="../../css/variables.css" />
<link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="topbar">
  <a href="../" class="topbar__back">←</a>
  <div class="topbar__title">내 계정 정보</div>
</header>

<div class="container">
  <form id="profileForm" class="card form-card">
    <div class="field">
      <label>아이디</label>
      <input id="username" type="text" disabled />
    </div>
    <div class="field">
      <label>이메일</label>
      <input id="email" type="text" disabled />
    </div>
    <div class="field">
      <label>가입일</label>
      <input id="createdAt" type="text" disabled />
    </div>
    <div class="field">
      <label for="name">이름</label>
      <input id="name" type="text" required />
    </div>
    <div class="field">
      <label for="phone">전화번호</label>
      <input id="phone" type="text" placeholder="010-0000-0000" />
    </div>
    <div class="form-feedback" id="profileFeedback"></div>
    <button type="submit" class="btn btn-primary btn-block">정보 저장</button>
  </form>

  <form id="passwordForm" class="card form-card">
    <h2 class="form-card__title">비밀번호 변경</h2>
    <div class="field">
      <label for="currentPassword">현재 비밀번호</label>
      <input id="currentPassword" type="password" required />
    </div>
    <div class="field">
      <label for="newPassword">새 비밀번호</label>
      <input id="newPassword" type="password" minlength="6" required />
    </div>
    <div class="field">
      <label for="newPasswordConfirm">새 비밀번호 확인</label>
      <input id="newPasswordConfirm" type="password" minlength="6" required />
    </div>
    <div class="form-error" id="passwordError"></div>
    <div class="form-feedback" id="passwordFeedback"></div>
    <button type="submit" class="btn btn-secondary btn-block">비밀번호 변경</button>
  </form>
</div>

<nav class="bottomnav">
  <a class="bottomnav__item" href="../../index.html">홈</a>
  <a class="bottomnav__item" href="../../menus/list.html">메뉴</a>
  <a class="bottomnav__item" href="../../basket/list.html">장바구니</a>
  <a class="bottomnav__item" href="../../orders/list.html">주문내역</a>
  <a class="bottomnav__item is-active" href="../">마이</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../js/supabase-client.js"></script>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="index.js"></script>
</body>
</html>
