<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마이페이지 - 해피해피 용's 카페</title>
<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar__title" data-icon="user">마이페이지</div>
  <div class="topbar__actions"></div>
</header>

<div class="container">
  <div class="card profile-card" id="profileCard"></div>

  <div class="card stamp-card" id="stampCard">
    <div class="stamp-card__head">
      <span class="stamp-card__title">도장 쿠폰</span>
      <span class="stamp-card__count" id="stampCount"></span>
    </div>
    <div class="stamp-card__dots" id="stampCardDots"></div>
    <p class="stamp-card__desc" id="stampCardDesc"></p>
  </div>

  <div id="statsRow" class="stats-row"></div>

  <nav class="my-menu">
    <a class="card my-menu__item" href="../basket/list.html">
      <span class="my-menu__icon my-menu__icon--cart" data-icon="cart"></span>
      <span class="my-menu__label">장바구니</span>
      <span class="my-menu__count" id="cartCount"></span>
      <span class="my-menu__chevron">›</span>
    </a>
    <a class="card my-menu__item" href="../orders/list.html">
      <span class="my-menu__icon my-menu__icon--orders" data-icon="receipt"></span>
      <span class="my-menu__label">주문 내역</span>
      <span class="my-menu__count" id="orderCount"></span>
      <span class="my-menu__chevron">›</span>
    </a>
    <a class="card my-menu__item" href="../mileage/">
      <span class="my-menu__icon my-menu__icon--mileage" data-icon="wallet"></span>
      <span class="my-menu__label">마일리지 충전</span>
      <span class="my-menu__count" id="mileageCount"></span>
      <span class="my-menu__chevron">›</span>
    </a>
    <a class="card my-menu__item" href="../subscribe/">
      <span class="my-menu__icon my-menu__icon--mileage" data-icon="star"></span>
      <span class="my-menu__label">구독</span>
      <span class="my-menu__count" id="subStatusLabel"></span>
      <span class="my-menu__chevron">›</span>
    </a>
  </nav>

  <div class="my-menu__divider">관리자용</div>

  <nav class="my-menu">
    <a class="card my-menu__item my-menu__item--admin" href="../admin/">
      <span class="my-menu__icon my-menu__icon--admin" data-icon="admin"></span>
      <span class="my-menu__label">관리자 모드</span>
      <span class="my-menu__chevron">›</span>
    </a>
  </nav>
</div>

<nav class="bottomnav">
  <a class="bottomnav__item" href="../index.html">홈</a>
  <a class="bottomnav__item" href="../menus/list.html">메뉴</a>
  <a class="bottomnav__item" href="../basket/list.html">장바구니</a>
  <a class="bottomnav__item" href="../orders/list.html">주문내역</a>
  <a class="bottomnav__item is-active" href="./">마이</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="index.js"></script>
</body>
</html>
