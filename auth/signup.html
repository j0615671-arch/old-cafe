<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>회원가입 - 해피해피 용's 카페</title>
<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="signup.css" />
</head>
<body>
<header class="topbar">
  <a href="login.html" class="topbar__back">←</a>
  <div class="topbar__title">회원가입</div>
</header>

<div class="container">
  <form id="signupForm" class="card form-card">
    <div class="field">
      <label for="id">아이디</label>
      <input id="id" name="id" type="text" required />
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required />
    </div>
    <div class="field">
      <label for="name">이름</label>
      <input id="name" name="name" type="text" required />
    </div>
    <div class="field">
      <label for="email">이메일</label>
      <input id="email" name="email" type="email" required />
    </div>
    <div class="field">
      <label for="phone">전화번호</label>
      <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" required />
    </div>
    <div class="form-error" id="formError"></div>
    <button type="submit" class="btn btn-primary btn-block">가입하기</button>
  </form>
  <p class="form-footer">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
</div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="signup.js"></script>
</body>
</html>
