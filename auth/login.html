<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 - 해피해피 용's 카페</title>
<link rel="stylesheet" href="../css/variables.css" />
<link rel="stylesheet" href="login.css" />
</head>
<body>
<header class="topbar">
  <a href="../my/" class="topbar__back">←</a>
  <div class="topbar__title">로그인</div>
</header>

<div class="container">
  <div class="login-hero">
    <div class="login-hero__emoji">☕</div>
    <div class="login-hero__title">해피해피 용's 카페</div>
  </div>
  <form id="loginForm" class="card form-card">
    <div class="field">
      <label for="id">아이디</label>
      <input id="id" name="id" type="text" required />
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required />
    </div>
    <div class="form-error" id="formError"></div>
    <button type="submit" class="btn btn-primary btn-block">로그인</button>
  </form>
  <p class="form-footer">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
</div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="login.js"></script>
</body>
</html>
