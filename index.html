<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>해피해피 용's 카페</title>
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="topbar">
  <a href="index.html" class="topbar__title">해피해피 용's 카페</a>
  <div class="topbar__actions">
    <a href="basket/list.html" class="topbar__cart" data-icon="cart"><span class="topbar__cart-count" data-cart-count>0</span></a>
    <a href="my/" class="topbar__account" data-icon="user"></a>
  </div>
</header>

<section class="hero" id="hero">
  <div id="heroSlides"></div>
  <div class="hero__controls">
    <button id="heroPrev" class="hero__arrow" aria-label="이전 배너">‹</button>
    <div class="hero__dots" id="heroDots"></div>
    <button id="heroNext" class="hero__arrow" aria-label="다음 배너">›</button>
  </div>
</section>

<section class="stamp-banner">
  <div class="container stamp-banner__inner">
    <div class="stamp-banner__copy">
      <div class="stamp-banner__eyebrow">STAMP CARD</div>
      <h2 class="stamp-banner__title">도장 10개 모으면<br />음료 1잔이 무료</h2>
      <p class="stamp-banner__desc" id="stampDesc"></p>
      <a href="menus/list.html" id="stampCta" class="btn btn-primary">메뉴 보러가기</a>
    </div>
    <div class="stamp-banner__dots" id="stampDots"></div>
  </div>
</section>

<div class="container">
  <form id="searchForm" class="search-form">
    <input id="searchInput" class="search-input" type="search" placeholder="메뉴 이름, 설명, 카테고리로 검색" />
  </form>

  <h2 class="section-title">추천 메뉴</h2>
  <div id="featuredMenus" class="menu-teaser"></div>

  <h2 class="section-title">오늘의 추천 원두</h2>
  <section id="beanOfDaySection" class="bean-hero">
    <div id="beanOfDay"></div>
  </section>
</div>

<nav class="bottomnav">
  <a class="bottomnav__item is-active" href="index.html">홈</a>
  <a class="bottomnav__item" href="menus/list.html">메뉴</a>
  <a class="bottomnav__item" href="basket/list.html">장바구니</a>
  <a class="bottomnav__item" href="orders/list.html">주문내역</a>
  <a class="bottomnav__item" href="my/">마이</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="index.js"></script>
</body>
</html>
